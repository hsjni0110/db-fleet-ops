services:
  metadata-mysql:
    image: mysql:8.0
    container_name: db-fleetops-metadata-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${METADATA_MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${METADATA_MYSQL_DATABASE:-db_fleetops}
      MYSQL_USER: ${METADATA_MYSQL_USERNAME:-dbfleet}
      MYSQL_PASSWORD: ${METADATA_MYSQL_PASSWORD:-dbfleetpw}
      TZ: Asia/Seoul
    ports:
      - "${METADATA_MYSQL_PORT:-3307}:3306"
    volumes:
      - metadata-mysql-data:/var/lib/mysql
      - ./infra/mysql/init-metadata-mysql.sql:/docker-entrypoint-initdb.d/01-init-metadata-mysql.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - db-fleetops-net

  target-mysql:
    image: mysql:8.0
    container_name: db-fleetops-target-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${TARGET_MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${TARGET_MYSQL_DATABASE:-orders}
      TZ: Asia/Seoul
    ports:
      - "${TARGET_MYSQL_PORT:-3308}:3306"
    volumes:
      - target-mysql-data:/var/lib/mysql
      - ./infra/mysql/init-target-mysql.sql:/docker-entrypoint-initdb.d/01-init-target-mysql.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - db-fleetops-net

  db-fleetops-api:
    image: db-fleetops-api:local
    container_name: db-fleetops-api
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker,api}
      DB_FLEETOPS_DATASOURCE_URL: jdbc:mysql://metadata-mysql:3306/${METADATA_MYSQL_DATABASE:-db_fleetops}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_FLEETOPS_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      DB_FLEETOPS_DATASOURCE_USERNAME: ${METADATA_MYSQL_USERNAME:-dbfleet}
      DB_FLEETOPS_DATASOURCE_PASSWORD: ${METADATA_MYSQL_PASSWORD:-dbfleetpw}
      DB_FLEETOPS_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      DB_FLEETOPS_JPA_DDL_AUTO: update
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
      JAVA_OPTS: ${API_JAVA_OPTS:--Xms256m -Xmx512m}
      TZ: Asia/Seoul
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      metadata-mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/actuator/health> /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - db-fleetops-net

  db-fleetops-worker:
    image: db-fleetops-api:local
    container_name: db-fleetops-worker
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${WORKER_SPRING_PROFILES_ACTIVE:-docker,worker}
      DB_FLEETOPS_DATASOURCE_URL: jdbc:mysql://metadata-mysql:3306/${METADATA_MYSQL_DATABASE:-db_fleetops}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      DB_FLEETOPS_DATASOURCE_DRIVER: com.mysql.cj.jdbc.Driver
      DB_FLEETOPS_DATASOURCE_USERNAME: ${METADATA_MYSQL_USERNAME:-dbfleet}
      DB_FLEETOPS_DATASOURCE_PASSWORD: ${METADATA_MYSQL_PASSWORD:-dbfleetpw}
      DB_FLEETOPS_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      DB_FLEETOPS_JPA_DDL_AUTO: update
      JAVA_OPTS: ${WORKER_JAVA_OPTS:--Xms256m -Xmx512m}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,metrics,prometheus"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "always"
      MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED: "true"
      TZ: Asia/Seoul
    ports:
      - "${WORKER_PORT:-8081}:8080"
    depends_on:
      metadata-mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/actuator/health> /dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - db-fleetops-net

  db-fleet-agent:
    image: db-fleet-agent:local
    container_name: db-fleet-agent
    build:
      context: ./agent-go
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      CONTROL_PLANE_URL: http://db-fleetops-api:8080
      AGENT_NAME: ${AGENT_NAME:-compose-agent-1}
      AGENT_VERSION: ${AGENT_VERSION:-0.1.0}
      AGENT_STATE_FILE: /var/lib/db-fleet-agent/agent-state.json
      BACKUP_DIRECTORY: /var/lib/db-fleet-agent/backups
      HEARTBEAT_INTERVAL_SECONDS: ${AGENT_HEARTBEAT_INTERVAL_SECONDS:-10}
      POLL_INTERVAL_SECONDS: ${AGENT_POLL_INTERVAL_SECONDS:-5}
      TZ: Asia/Seoul
    volumes:
      - agent-data:/var/lib/db-fleet-agent
    depends_on:
      db-fleetops-api:
        condition: service_healthy
      target-mysql:
        condition: service_healthy
    networks:
      - db-fleetops-net

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: db-fleetops-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    depends_on:
      db-fleetops-api:
        condition: service_healthy
      db-fleetops-worker:
        condition: service_healthy
    networks:
      - db-fleetops-net

volumes:
  metadata-mysql-data:
  target-mysql-data:
  agent-data:
  prometheus-data:

networks:
  db-fleetops-net:
    driver: bridge