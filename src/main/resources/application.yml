spring:
  application:
    name: db-fleetops

  datasource:
    url: ${DB_FLEETOPS_DATASOURCE_URL:jdbc:h2:mem:dbfleetops;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${DB_FLEETOPS_DATASOURCE_DRIVER:org.h2.Driver}
    username: ${DB_FLEETOPS_DATASOURCE_USERNAME:sa}
    password: ${DB_FLEETOPS_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: ${DB_FLEETOPS_HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
    show-sql: false

  mvc:
    problemdetails:
      enabled: true

server:
  port: ${SERVER_PORT:8080}

db-fleetops:
  target:
    host: ${DB_TARGET_HOST:127.0.0.1}
    port: ${DB_TARGET_PORT:3306}
    database: ${DB_TARGET_NAME:dbops_target}
    username: ${DB_TARGET_USERNAME:db_monitor}
    password: ${DB_TARGET_PASSWORD}
    connect-timeout: ${DB_CONNECT_TIMEOUT:2s}
    socket-timeout: ${DB_SOCKET_TIMEOUT:2s}
  cors:
    allowed-origins: ${DB_FLEETOPS_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  pattern:
    console: >-
      %d{yyyy-MM-dd HH:mm:ss.SSS}
      %-5level
      [%thread]
      [requestId=%X{requestId:-none}]
      %logger{36}
      - %msg%n

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db

  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

  prometheus:
    metrics:
      export:
        enabled: true