db-fleetops:
  worker:
    enabled: true
    id: ${DB_FLEETOPS_WORKER_ID:worker-1}
    claim-interval-ms: ${DB_FLEETOPS_WORKER_CLAIM_INTERVAL_MS:5000}
    shutdown:
      stop-claiming-on-shutdown: true

spring:
  main:
    web-application-type: servlet

  lifecycle:
    timeout-per-shutdown-phase: 60s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
