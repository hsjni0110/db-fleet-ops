apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: db-fleetops
  labels:
    app: prometheus
    component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
      component: observability
  template:
    metadata:
      labels:
        app: prometheus
        component: observability
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"

          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml

            - name: prometheus-data
              mountPath: /prometheus

      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config

        - name: prometheus-data
          emptyDir: {}