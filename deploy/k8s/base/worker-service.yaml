apiVersion: v1
kind: Service
metadata:
  name: db-fleetops-worker
  namespace: db-fleetops
  labels:
    app: db-fleetops-worker
    component: worker
spec:
  type: ClusterIP
  selector:
    app: db-fleetops-worker
    component: worker
  ports:
    - name: http
      port: 8080
      targetPort: http