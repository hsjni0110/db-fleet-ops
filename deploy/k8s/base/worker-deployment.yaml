apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-fleetops-worker
  namespace: db-fleetops
  labels:
    app: db-fleetops-worker
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: db-fleetops-worker
      component: worker
  template:
    metadata:
      labels:
        app: db-fleetops-worker
        component: worker
    spec:
      containers:
        - name: worker
          image: db-fleetops-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080

          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: TZ

            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: SPRING_PROFILES_ACTIVE_WORKER

            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: SERVER_PORT

            - name: DB_FLEETOPS_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: DB_FLEETOPS_DATASOURCE_URL

            - name: DB_FLEETOPS_DATASOURCE_DRIVER
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: DB_FLEETOPS_DATASOURCE_DRIVER

            - name: DB_FLEETOPS_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: DB_FLEETOPS_DATASOURCE_USERNAME

            - name: DB_FLEETOPS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-fleetops-secret
                  key: DB_FLEETOPS_DATASOURCE_PASSWORD

            - name: DB_FLEETOPS_HIBERNATE_DIALECT
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: DB_FLEETOPS_HIBERNATE_DIALECT

            - name: DB_FLEETOPS_JPA_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: DB_FLEETOPS_JPA_DDL_AUTO

            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE

            - name: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED

            - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS

            - name: MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED

            - name: JAVA_OPTS
              valueFrom:
                configMapKeyRef:
                  name: db-fleetops-config
                  key: WORKER_JAVA_OPTS

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"